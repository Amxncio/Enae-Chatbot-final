<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veterinary Clinic — Chat</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#e8f5e9,#c8e6c9)}
    .chat-container{display:flex;flex-direction:column;width:100%;max-width:640px;height:90vh;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 12px 40px rgba(0,0,0,.12)}
    .chat-header{padding:18px 24px;background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;font-size:1.1em;font-weight:600;text-align:center;letter-spacing:.3px}
    .chat-header small{display:block;font-size:.7em;font-weight:400;opacity:.85;margin-top:4px}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
    .msg{display:flex;max-width:80%}
    .msg.bot{align-self:flex-start}
    .msg.user{align-self:flex-end;flex-direction:row-reverse}
    .msg-bubble{padding:12px 16px;border-radius:16px;line-height:1.45;font-size:.95em;white-space:pre-wrap;word-break:break-word}
    .msg.bot .msg-bubble{background:#f1f1f1;border-bottom-left-radius:4px;color:#222}
    .msg.user .msg-bubble{background:#2e7d32;color:#fff;border-bottom-right-radius:4px}
    .msg-bubble.error{background:#ffebee;color:#c62828}
    .chat-input{display:flex;padding:12px 16px;border-top:1px solid #e0e0e0;background:#fafafa;gap:10px}
    .chat-input input{flex:1;padding:12px 16px;border:1px solid #ccc;border-radius:24px;font-size:1em;outline:none;transition:border-color .2s}
    .chat-input input:focus{border-color:#2e7d32}
    .chat-input button{padding:12px 24px;border:none;border-radius:24px;background:#2e7d32;color:#fff;font-weight:600;cursor:pointer;font-size:.95em;transition:background .2s}
    .chat-input button:hover{background:#1b5e20}
    .chat-input button:disabled{opacity:.5;cursor:default}
    .typing{opacity:.6;font-style:italic;font-size:.85em;padding:4px 0}
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      🐾 Veterinary Clinic Assistant
      <small>Sterilisation scheduling &amp; pre-surgery info</small>
    </div>
    <div class="chat-messages" id="messages">
      <div class="msg bot"><div class="msg-bubble">Hola, soy la asistente de la clinica veterinaria. Te ayudo a pedir cita de esterilizacion paso a paso. Empezamos por lo basico: servicio, especie, sexo y peso (si es perra). ¿Quieres agendar una cita?</div></div>
    </div>
    <form class="chat-input" id="chatForm">
      <input type="text" id="msgInput" placeholder="Ejemplo: Quiero cita para perra hembra 12 kg" autocomplete="off" autofocus>
      <button type="submit" id="sendBtn">Send</button>
    </form>
  </div>

  <script>
    const SESSION_ID = "sess_" + Math.random().toString(36).substring(2, 10);
    const messages = document.getElementById("messages");
    const form = document.getElementById("chatForm");
    const input = document.getElementById("msgInput");
    const btn = document.getElementById("sendBtn");

    function addMsg(text, cls) {
      const d = document.createElement("div");
      d.className = "msg " + cls;
      const b = document.createElement("div");
      b.className = "msg-bubble";
      b.textContent = text;
      d.appendChild(b);
      messages.appendChild(d);
      messages.scrollTop = messages.scrollHeight;
    }

    function addError(text) {
      const d = document.createElement("div");
      d.className = "msg bot";
      const b = document.createElement("div");
      b.className = "msg-bubble error";
      b.textContent = text;
      d.appendChild(b);
      messages.appendChild(d);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      addMsg(text, "user");
      input.value = "";
      btn.disabled = true;

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.textContent = "Thinking…";
      messages.appendChild(typing);
      messages.scrollTop = messages.scrollHeight;

      try {
        const body = new URLSearchParams({ msg: text, session_id: SESSION_ID });
        const resp = await fetch("/ask_bot", { method: "POST", body });
        if (!resp.ok) throw new Error("Server error: " + resp.status);
        const data = await resp.json();
        typing.remove();
        addMsg(data.msg || data.error || "No response", "bot");
      } catch (err) {
        typing.remove();
        addError("Connection error: " + err.message);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
